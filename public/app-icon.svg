<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1577B0"/>

  <!-- Left ear (outer) -->
  <path d="M145 215 L162 95 L235 178 Z" fill="white"/>
  <!-- Left ear (inner shadow) -->
  <path d="M163 205 L174 115 L222 174 Z" fill="#1577B0" fill-opacity="0.45"/>

  <!-- Right ear (outer) -->
  <path d="M367 215 L350 95 L277 178 Z" fill="white"/>
  <!-- Right ear (inner shadow) -->
  <path d="M349 205 L338 115 L290 174 Z" fill="#1577B0" fill-opacity="0.45"/>

  <!-- Main face circle -->
  <circle cx="256" cy="295" r="168" fill="white"/>

  <!-- Raccoon eye mask patches -->
  <ellipse cx="195" cy="272" rx="68" ry="54" fill="#1a3a55" fill-opacity="0.18"/>
  <ellipse cx="317" cy="272" rx="68" ry="54" fill="#1a3a55" fill-opacity="0.18"/>

  <!-- Chin / lower face lighter area -->
  <ellipse cx="256" cy="368" rx="100" ry="78" fill="white"/>

  <!-- Glasses left ring -->
  <circle cx="192" cy="278" r="54" stroke="#D44422" stroke-width="16" fill="none"/>
  <!-- Glasses right ring -->
  <circle cx="320" cy="278" r="54" stroke="#D44422" stroke-width="16" fill="none"/>
  <!-- Glasses bridge -->
  <line x1="246" y1="278" x2="266" y2="278" stroke="#D44422" stroke-width="16" stroke-linecap="round"/>
  <!-- Glasses left temple arm -->
  <line x1="138" y1="268" x2="138" y2="264" stroke="#D44422" stroke-width="16" stroke-linecap="round"/>

  <!-- Left eye (happy squint arc) -->
  <path d="M163 272 Q192 254 221 272" stroke="#1a2e45" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Right eye (happy squint arc) -->
  <path d="M291 272 Q320 254 349 272" stroke="#1a2e45" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <ellipse cx="256" cy="323" rx="18" ry="13" fill="#1a2e45" fill-opacity="0.55"/>

  <!-- Smile -->
  <path d="M232 348 Q256 370 280 348" stroke="#1a2e45" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
